[www]
; Jalankan worker sebagai user yang sama dengan master process (uid=1000)
; Ini konsisten dengan docker-compose user: "1000:1000"
user = nobody
group = nobody

listen = 9000
listen.owner = nobody
listen.group = nobody

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Log error ke stderr (ditangkap oleh docker logs)
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Clear environment agar tidak inherit env var yang tidak perlu
clear_env = no
