services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sibuk-app:latest
    container_name: sibuk-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ./app:/var/www/html/app
      - ./bootstrap:/var/www/html/bootstrap
      - ./config:/var/www/html/config
      - ./routes:/var/www/html/routes
      - ./storage:/var/www/html/storage
      - ./public/build:/var/www/html/public/build
    networks:
      - sibuk-network
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: sibuk-nginx
    restart: unless-stopped
    ports:
      - "7008:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public:ro
    networks:
      - sibuk-network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: sibuk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sibuk
      POSTGRES_USER: sibuk_user
      POSTGRES_PASSWORD: sibuk_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sibuk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibuk_user -d sibuk"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sibuk-network:
    driver: bridge

volumes:
  postgres_data:
