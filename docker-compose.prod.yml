services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sibuk-app:latest
    container_name: sibuk-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      - sibuk-network
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: sibuk-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public:ro
    networks:
      - sibuk-network
      - coolify
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.sibuk-http.rule=Host(`sibuk.ircham.dev`)"
      - "traefik.http.routers.sibuk-http.entrypoints=http"
      - "traefik.http.routers.sibuk-http.middlewares=sibuk-https-redirect"
      - "traefik.http.middlewares.sibuk-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.sibuk.rule=Host(`sibuk.ircham.dev`)"
      - "traefik.http.routers.sibuk.entrypoints=https"
      - "traefik.http.routers.sibuk.tls=true"
      - "traefik.http.routers.sibuk.tls.certresolver=letsencrypt-dns"
      - "traefik.http.services.sibuk.loadbalancer.server.port=80"

  postgres:
    image: postgres:16-alpine
    container_name: sibuk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sibuk
      POSTGRES_USER: sibuk_user
      POSTGRES_PASSWORD: sibuk_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sibuk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibuk_user -d sibuk"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sibuk-network:
    driver: bridge
  coolify:
    external: true

volumes:
  postgres_data:
